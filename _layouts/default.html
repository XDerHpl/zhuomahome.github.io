<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <a class="skip-link" href="#main">跳转到正文</a>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.profile.name }} 主页">
        <span class="brand-mark">{{ site.profile.name | slice: 0, 1 }}</span>
        <span>
          <strong>{{ site.profile.name }}</strong>
          <small>{{ site.profile.name_en }}</small>
        </span>
      </a>
      <nav class="site-nav" aria-label="主导航">
        {% for item in site.nav %}
          <a href="{{ item.url | relative_url }}" {% if page.url == item.url %}aria-current="page"{% endif %}>{{ item.title }}</a>
        {% endfor %}
      </nav>
    </div>
  </header>

  <main id="main" class="container page-shell">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span>© {{ 'now' | date: '%Y' }} {{ site.profile.name }}.</span>
      <span>Powered by Jekyll & GitHub Pages.</span>
    </div>
  </footer>
</body>
</html>
